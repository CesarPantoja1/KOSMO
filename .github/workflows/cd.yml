name: Continuous Deployment

on:
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate-database:
    if: >-
      ${{
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        (
          github.event.pull_request.head.ref == 'develop' ||
          startsWith(github.event.pull_request.head.ref, 'hotfix/')
        )
      }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen --no-dev

      - name: Validate database secret
        run: test -n "$DATABASE_URL" || (echo "::error::Missing SUPABASE_DATABASE_URL secret" && exit 1)
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

      - name: Apply Alembic migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

  deploy-frontend:
    needs:
      - migrate-database
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.10'

      - name: Install Vercel CLI
        run: bun install -g vercel

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN" || (echo "::error::Missing VERCEL_TOKEN secret" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "::error::Missing VERCEL_ORG_ID secret" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "::error::Missing VERCEL_PROJECT_ID secret" && exit 1)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy frontend to Vercel
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          test -f .vercel/.env.production.local || (echo "::error::Vercel production env was not pulled" && exit 1)
          api_url="$(grep '^NEXT_PUBLIC_API_URL=' .vercel/.env.production.local | tail -n 1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//')"
          if [ -z "$api_url" ]; then
            echo "::error::Missing or empty NEXT_PUBLIC_API_URL in Vercel production environment variables"
            exit 1
          fi
          case "$api_url" in
            http://localhost*|https://localhost*|http://127.0.0.1*|https://127.0.0.1*)
              echo "::error::NEXT_PUBLIC_API_URL in Vercel production points to a loopback address"
              exit 1
              ;;
            https://*)
              ;;
            *)
              echo "::error::NEXT_PUBLIC_API_URL must be an https:// URL"
              exit 1
              ;;
          esac
          if [ "$api_url" != "https://kosmo-backend.onrender.com" ]; then
            echo "::warning::NEXT_PUBLIC_API_URL is $api_url; expected https://kosmo-backend.onrender.com"
          fi
          if grep -R "localhost:8000" .next/static >/dev/null 2>&1; then
            echo "::error::Previous build artifacts contain localhost; cleaning .next"
            rm -rf .next
          fi
          vercel build --prod --token="$VERCEL_TOKEN"
          if grep -R "localhost:8000" .vercel/output/static .next/static >/dev/null 2>&1; then
            echo "::error::Production frontend bundle still contains localhost:8000"
            exit 1
          fi
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    needs:
      - migrate-database
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate Render secrets
        run: |
          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            exit 0
          fi

          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::notice::Using RENDER_DEPLOY_HOOK_URL fallback. Prefer RENDER_API_KEY and RENDER_SERVICE_ID to deploy the exact merge commit."
            exit 0
          fi

          echo "::error::Missing Render deployment secrets. Set RENDER_API_KEY + RENDER_SERVICE_ID, or RENDER_DEPLOY_HOOK_URL."
          exit 1
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Render deploy
        run: |
          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            curl --fail --request POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Content-Type: application/json" \
              --data "{\"commitId\":\"${DEPLOY_SHA}\",\"clearCache\":\"do_not_clear\"}"
            exit 0
          fi

          curl --fail --request POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          DEPLOY_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
