name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      changed_files: ${{ steps.changes.outputs.changed_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect affected workspaces
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [ -z "$base_sha" ] || [[ "$base_sha" =~ ^0+$ ]] || ! git cat-file -e "$base_sha" 2>/dev/null; then
            base_sha="$(git rev-list --max-parents=0 "$head_sha")"
          fi

          git diff --name-only "$base_sha" "$head_sha" | sort > changed-files.txt

          backend=false
          frontend=false

          while IFS= read -r file; do
            case "$file" in
              .github/workflows/*|docker-compose.yml|.env.example)
                backend=true
                frontend=true
                ;;
              backend/*|render.yaml|ENV_VARIABLES_GUIDE.md|INFORME_DEVOPS_DOCKER.md)
                backend=true
                ;;
              frontend/*|vercel.json|VERCEL_DEPLOYMENT_GUIDE.md)
                frontend=true
                ;;
            esac
          done < changed-files.txt

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "changed_files<<EOF"
            cat changed-files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Changed files:"
          cat changed-files.txt
          echo "backend=$backend"
          echo "frontend=$frontend"

  backend:
    name: Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    env:
      ENV: development
      LOG_LEVEL: INFO
      JWT_PRIVATE_KEY_PATH: ./tmp/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: ./tmp/jwt_public.pem
      FERNET_MASTER_KEY: gA9S7Jv4nWq3kL8fDm2QpZx1Yh5Tn6CbRrUuIi0o4jM=
      DATABASE_URL: postgresql+asyncpg://kosmo:kosmo@localhost:5432/kosmo_dev
      MONGO_URL: mongodb://localhost:27017/kosmo_agent_memory
      REDIS_URL: redis://localhost:6379/0
      LLM_PROVIDER: noop
      LLM_MODEL: noop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Run Pyright
        run: uv run pyright

      - name: Run unit tests
        run: uv run pytest tests/unit --cov=kosmo --cov-fail-under=0

  frontend:
    name: Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.10'

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/bun.lock') }}-${{ hashFiles('frontend/**/*.js', 'frontend/**/*.jsx', 'frontend/**/*.ts', 'frontend/**/*.tsx', 'frontend/**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run tests
        run: bun run test -- --run --passWithNoTests

      - name: Run build
        run: bun run build

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - backend
      - frontend
    if: always()

    steps:
      - name: Report CI result
        shell: bash
        run: |
          set -euo pipefail

          echo "Backend required: ${{ needs.detect-changes.outputs.backend }}"
          echo "Backend result:   ${{ needs.backend.result }}"
          echo "Frontend required: ${{ needs.detect-changes.outputs.frontend }}"
          echo "Frontend result:   ${{ needs.frontend.result }}"

          if [ "${{ needs.backend.result }}" = "failure" ] || \
             [ "${{ needs.backend.result }}" = "cancelled" ] || \
             [ "${{ needs.frontend.result }}" = "failure" ] || \
             [ "${{ needs.frontend.result }}" = "cancelled" ]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi

          if [ "${{ needs.detect-changes.outputs.backend }}" != "true" ] && \
             [ "${{ needs.detect-changes.outputs.frontend }}" != "true" ]; then
            echo "No backend or frontend changes detected. Heavy CI jobs were skipped."
          else
            echo "Required CI jobs completed successfully."
          fi
