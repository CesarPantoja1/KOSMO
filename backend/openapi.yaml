  # ── Requirements ─────────────────────────────────────────────────────────────

  /api/v1/features/{feature_id}/requirements/generate:
    post:
      tags: [requirements]
      summary: Generar requisitos EARS para una feature
      description: |
        Invoca al agente de IA para generar requisitos en formato EARS
        (Easy Approach to Requirements Syntax) para la feature especificada.
        Los requisitos se clasifican en patrones: Ubicuos, Basados en Eventos,
        Determinados por el Estado, Opcionales, de Respuesta ante Fallos y Complejos.

        El `project_id` debe enviarse en el cuerpo de la petición. La `feature_id`
        en la URL puede ser el identificador ULID (`feat_`) o el slug.
      operationId: generate_requirements
      security:
        - BearerAuth: []
      parameters:
        - name: feature_id
          in: path
          required: true
          schema:
            type: string
          description: Identificador de la feature (feat_ + ULID) o slug.
          example: feat-01HXYAZABCDEFGHIJKLMNOP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequirementsRequest"
            example:
              project_id: prj-01HXYAZABCDEFGHIJKLMNOP
      responses:
        "200":
          description: Requisitos EARS generados exitosamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateRequirementsResponse"
              example:
                feature_id: feat-01HXYAZABCDEFGHIJKLMNOP
                feature_number: 1
                requirements_markdown: |
                  # Requisitos EARS — Catálogo de productos

                  ## Requisitos Ubicuos
                  - El sistema shall mostrar una lista paginada de productos.
                  - El sistema shall permitir filtrar productos por categoría.
                  - El sistema shall mostrar el precio y disponibilidad de cada producto.

                  ## Requisitos Basados en Eventos
                  - CUANDO el usuario selecciona una categoría, el sistema shall filtrar la lista de productos.
                  - CUANDO el usuario aplica un filtro de precio, el sistema shall actualizar los resultados.

                  ## Requisitos Determinados por el Estado
                  - MIENTRAS la búsqueda esté activa, el sistema shall mostrar un indicador de carga.

                  ## Requisitos de Respuestas Deseadas ante Fallos
                  - SI la búsqueda no produce resultados, el sistema shall mostrar un mensaje sugeriendo ampliar criterios.
                total: 8
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Feature o proyecto no encontrados.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: urn:kosmo:features:not-found
                title: Feature no encontrada
                status: 404
                detail: La feature feat-01NONEXIST no existe en este proyecto
                instance: /api/v1/features/feat-01NONEXIST/requirements/generate
                trace_id: "01KT05JRA7466PPYQXYTX"
                violations: []
        "409":
          description: La feature no está en estado aprobado. Solo se pueden generar requisitos para features aprobadas.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: urn:kosmo:features:not-approved
                title: Feature no aprobada
                status: 409
                detail: La feature feat-01HXYAZ debe estar Aprobada para generar requisitos
                instance: /api/v1/features/feat-01HXYAZ/requirements/generate
                trace_id: "01KT05JRA7466PPYQXYTX"
                violations: []
        "422":
          $ref: "#/components/responses/ValidationError"
        "502":
          description: Error al invocar el modelo de IA (LLM).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: urn:kosmo:llm:invocation-error
                title: Error de invocación al modelo de IA
                status: 502
                detail: El modelo de IA no respondió dentro del tiempo límite
                instance: /api/v1/features/feat-01HXYAZ/requirements/generate
                trace_id: "01KT05JRA7466PPYQXYTX"
                violations: []
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/features/{feature_id}/requirements:
    get:
      tags: [requirements]
      summary: Obtener requisitos de una feature
      description: |
        Recupera el documento de requisitos EARS de la feature especificada.
        Requiere el `project_id` como query parameter para resolución contextual.
        Devuelve `404` si la feature no existe o si no se han generado requisitos.
      operationId: get_requirements
      security:
        - BearerAuth: []
      parameters:
        - name: feature_id
          in: path
          required: true
          schema:
            type: string
          description: Identificador de la feature (feat_ + ULID) o slug.
          example: feat-01HXYAZABCDEFGHIJKLMNOP
        - name: project_id
          in: query
          required: true
          schema:
            type: string
          description: Identificador del proyecto padre (prj_ + ULID).
          example: prj-01HXYAZABCDEFGHIJKLMNOP
      responses:
        "200":
          description: Documento de requisitos recuperado exitosamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementsDocumentResponse"
              example:
                document_markdown: |
                  # Requisitos EARS — Catálogo de productos

                  ## Requisitos Ubicuos
                  - El sistema shall mostrar una lista paginada de productos.
                  - El sistema shall permitir filtrar productos por categoría.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Feature no encontrada en el proyecto especificado.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: urn:kosmo:features:not-found
                title: Feature no encontrada
                status: 404
                detail: La feature feat-01NONEXIST no existe en este proyecto
                instance: /api/v1/features/feat-01NONEXIST/requirements
                trace_id: "01KT05JRA7466PPYQXYTX"
                violations: []
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags: [requirements]
      summary: Guardar ediciones de requisitos
      description: |
        Guarda el contenido editado del documento de requisitos EARS en formato
        Markdown. El `project_id` debe enviarse en el cuerpo junto con el markdown.
        La `feature_id` en la URL puede ser el identificador ULID o el slug.
      operationId: save_requirements
      security:
        - BearerAuth: []
      parameters:
        - name: feature_id
          in: path
          required: true
          schema:
            type: string
          description: Identificador de la feature (feat_ + ULID) o slug.
          example: feat-01HXYAZABCDEFGHIJKLMNOP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveRequirementsRequest"
            example:
              project_id: prj-01HXYAZABCDEFGHIJKLMNOP
              markdown: |
                # Requisitos EARS — Catálogo de productos

                ## Requisitos Ubicuos
                - El sistema shall mostrar una lista paginada de productos.
                - El sistema shall permitir filtrar productos por categoría.
      responses:
        "200":
          description: Requisitos guardados exitosamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementsSaveResponse"
              example:
                feature_id: feat-01HXYAZABCDEFGHIJKLMNOP
                message: ok
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Feature no encontrada en el proyecto especificado.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: urn:kosmo:features:not-found
                title: Feature no encontrada
                status: 404
                detail: La feature feat-01NONEXIST no existe en este proyecto
                instance: /api/v1/features/feat-01NONEXIST/requirements
                trace_id: "01KT05JRA7466PPYQXYTX"
                violations: []
        "409":
          description: La feature no es editable en su estado actual.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: urn:kosmo:features:not-editable
                title: Feature no editable
                status: 409
                detail: La feature no es editable en su estado actual
                instance: /api/v1/features/feat-01HXYAZ/requirements
                trace_id: "01KT05JRA7466PPYQXYTX"
                violations: []
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── Schemas ──────────────────────────────────────────────────────────────────

  /api/v1/schemas:
    get:
      tags: [schemas]
      summary: Listar esquemas disponibles para introspección
      description: |
        Devuelve la lista alfabética de nombres de todos los DTOs expuestos por la API
        cuyo JSON Schema puede consultarse mediante el endpoint `GET /api/v1/schemas/{name}`.
        Útil para generación dinámica de formularios y tipos TypeScript en el Frontend.
      operationId: list_schemas
      responses:
        "200":
          description: Lista de nombres de esquemas disponibles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemaListResponse"
              example:
                schemas:
                  - AuthorizationCodeResponse
                  - AuthorizeRequest
                  - LogoutRequest
                  - OAuthErrorResponse
                  - PrincipalView
                  - RegisterRequest
                  - TokenExchangeRequest
                  - TokenPairResponse
                  - TokenRefreshRequest
                  - UserPublic
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/schemas/{name}:
    get:
      tags: [schemas]
      summary: Obtener JSON Schema de un DTO por nombre
      description: |
        Devuelve el JSON Schema completo (Draft 2020-12) del DTO solicitado.
        El esquema incluye tipos, restricciones de validación, valores por defecto
        y descripciones de cada campo, permitiendo al Frontend generar formularios
        y validaciones de forma dinámica.
      operationId: get_schema
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Nombre exacto del DTO cuyo JSON Schema se solicita.
          example: RegisterRequest
      responses:
        "200":
          description: JSON Schema del DTO solicitado.
          content:
            application/json:
              schema:
                type: object
                description: JSON Schema (Draft 2020-12) del DTO.
              example:
                $defs:
                  EmailStr:
                    type: string
                    format: email
                properties:
                  email:
                    $ref: "#/$defs/EmailStr"
                    description: Dirección de correo electrónico del nuevo usuario.
                    examples: ["usuario@ejemplo.com"]
                    title: Email
                  password:
                    type: string
                    minLength: 12
                    maxLength: 128
                    description: Contraseña en texto plano.
                    examples: ["M1ContraseñaSegura!"]
                    title: Password
                required: [email, password]
                additionalProperties: false
                title: RegisterRequest
                type: object
        "404":
          description: El nombre del esquema solicitado no existe en el registro.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HttpErrorResponse"
              example:
                detail: "Schema 'InexistenteRequest' no encontrado"
        "500":
          $ref: "#/components/responses/InternalServerError"


