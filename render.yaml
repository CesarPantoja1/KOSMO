services:
  - type: web
    name: kosmo-backend
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: OTEL_SERVICE_NAME
        value: kosmo-backend
      - key: OTEL_ENVIRONMENT
        value: production
      - key: RUN_MIGRATIONS
        value: "0"
      - key: AUTH_DISABLED
        value: "true"
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
